project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll

website:
  title: "Corentin Mary"
  description: "Physics student — Cosmology & Neutrino Physics"
  favicon: assets/img/favicon.png

  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Research"
        href: research.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Beyond"
        href: personal.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/Corentin-phy
        aria-label: GitHub
    pinned: false
    background: light

  page-footer:
    left: "© 2026 Corentin Mary"
    right:
      - icon: github
        href: https://github.com/Corentin-phy

  google-analytics: ""   # Add your GA4 ID later if needed

format:
  html:
    theme:
      - flatly
      - assets/css/custom.scss
    css: assets/css/extra.css
    toc: false
    page-layout: full
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    include-after-body:
      - text: |
          <script src="assets/js/starfield.js"></script>
